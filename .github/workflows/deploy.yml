name: Deploy

on:
  push:
    branches: [main]

# Deploys must never run concurrently: two back-to-back merges once raced and
# the older build finished last, shipping stale code to production. Queue them
# instead (never cancel a running deploy mid-flight; the newest queued run
# supersedes older queued ones).
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
        env:
          npm_config_registry: 'https://registry.npmjs.org/'
      - name: Run D1 migrations
        # Apply every migration in order. New tables use CREATE TABLE IF NOT
        # EXISTS; the ALTER TABLE migrations are not idempotent, so re-runs of
        # already-applied ones are tolerated with `|| true`. Looping over the
        # directory means new migration files are picked up automatically.
        run: |
          for f in migrations/*.sql; do
            echo "-> $f"
            npx wrangler d1 execute ping-pong-club-db --remote --file="$f" || true
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.PING_PONG_CLUB_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.PING_PONG_CLUB_CLOUDFLARE_ACCOUNT_ID }}
      - run: npm run build
      - run: npx wrangler pages deploy --project-name=ping-pong-club
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.PING_PONG_CLUB_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.PING_PONG_CLUB_CLOUDFLARE_ACCOUNT_ID }}
