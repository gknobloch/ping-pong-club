name = "ping-pong-club"
pages_build_output_dir = "./dist"
compatibility_date = "2025-01-01"

[[d1_databases]]
binding = "DB"
database_name = "ping-pong-club-db"
database_id = "11b715a2-d479-4bdd-9474-8ba49ce74c6c"

# Auth bindings (see docs/AUTH_SETUP.md). Configured per-environment on
# Cloudflare Pages, NOT committed here:
#   RESEND_API_KEY    secret  — Resend API key (omit -> OTP logged, not emailed)
#   RESEND_FROM       var     — verified sender, e.g. "Ping-Pong Club <no-reply@yourdomain>"
#   GOOGLE_CLIENT_IDS var     — comma-separated accepted Google audiences (web,iOS,Android)
#   APPLE_CLIENT_IDS  var     — comma-separated accepted Apple audiences (web Service ID, native bundle id)
# Locally these come from `.dev.vars` (see .dev.vars.example).
