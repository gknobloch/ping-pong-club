<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!--
    Android adaptive-icon foreground. Same photo crop as icon.svg, scaled into
    the safe zone (~62%) on a transparent background. The OS composites this
    over the backgroundColor declared in app.json (#1e293b).
  -->
  <defs>
    <clipPath id="frame">
      <rect width="1024" height="1024"/>
    </clipPath>
    <linearGradient id="tint" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1c" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0a0f1c" stop-opacity="0.40"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.50"/>
    </radialGradient>
  </defs>
  <g transform="translate(512 512) scale(0.62) translate(-512 -512)">
    <g clip-path="url(#frame)">
      <image href="{{PHOTO}}" x="-440" y="0" width="1535" height="1024" preserveAspectRatio="none"/>
      <rect width="1024" height="1024" fill="url(#tint)"/>
      <rect width="1024" height="1024" fill="url(#vignette)"/>
    </g>
  </g>
</svg>
